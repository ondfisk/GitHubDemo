---
version: 2
updates:
  - package-ecosystem: devcontainers
    directory: /
    schedule:
      interval: weekly
    groups:
      devcontainers:
        patterns:
          - "*"
    cooldown:
      default-days: 7

  - package-ecosystem: dotnet-sdk
    directory: /
    schedule:
      interval: weekly
    groups:
      dotnet:
        patterns:
          - "*"
    cooldown:
      default-days: 7

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
    cooldown:
      default-days: 7

  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
    groups:
      dotnet:
        patterns:
          - "*"
    ignore:
      - dependency-name: Microsoft.OpenApi # Required for .NET 10: Microsoft.OpenApi must stay below 3.0
        versions:
          - ">=3.0.0"
    cooldown:
      default-days: 7
